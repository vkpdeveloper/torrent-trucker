<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads — Torrent Trucker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           oklch(9.5% 0.012 245);
      --surface:      oklch(13.5% 0.015 245);
      --surface2:     oklch(18% 0.018 245);
      --border:       oklch(23% 0.02 245);
      --accent:       oklch(72% 0.22 142);
      --accent-dim:   oklch(72% 0.22 142 / 14%);
      --amber:        oklch(74% 0.18 65);
      --amber-dim:    oklch(74% 0.18 65 / 14%);
      --red:          oklch(60% 0.22 25);
      --red-dim:      oklch(60% 0.22 25 / 14%);
      --steel:        oklch(50% 0.015 245);
      --text:         oklch(93% 0.008 245);
      --text-muted:   oklch(58% 0.018 245);
      --text-faint:   oklch(36% 0.015 245);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ──────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 0.75rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-faint);
    }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }

    .conn-dot.live {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .nav-links {
      display: flex;
      gap: 0.125rem;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.35rem 0.65rem;
      border-radius: 5px;
      transition: color 0.12s, background 0.12s;
      letter-spacing: -0.01em;
    }

    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); }

    /* ── Main ─────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 740px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 3rem;
    }

    /* ── Page header ──────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .counter {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-faint);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.18rem 0.65rem;
      letter-spacing: -0.01em;
    }

    /* ── Empty state ──────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      opacity: 0.25;
      margin-bottom: 1rem;
      display: block;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
      letter-spacing: -0.02em;
    }

    .empty-state p {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--accent);
      color: oklch(10% 0.01 142);
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .btn-add:hover { opacity: 0.87; }

    /* ── Download list ────────────────────────────────── */
    .download-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── Download card ────────────────────────────────── */
    .dl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .dl-card:hover { border-color: oklch(28% 0.022 245); }

    /* Status left accent bar */
    .dl-card-inner {
      padding: 1rem 1.1rem 0.85rem;
      border-left: 3px solid transparent;
    }

    .dl-card[data-status="downloading"] .dl-card-inner { border-left-color: var(--accent); }
    .dl-card[data-status="paused"]      .dl-card-inner { border-left-color: var(--amber); }
    .dl-card[data-status="completed"]   .dl-card-inner { border-left-color: oklch(68% 0.18 142 / 50%); }
    .dl-card[data-status="error"]       .dl-card-inner { border-left-color: var(--red); }
    .dl-card[data-status="queued"]      .dl-card-inner { border-left-color: var(--steel); }
    .dl-card[data-status="stopped"]     .dl-card-inner { border-left-color: var(--text-faint); }

    /* ── Card top row ─────────────────────────────────── */
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      margin-bottom: 0.8rem;
    }

    .status-pill {
      flex-shrink: 0;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.22rem 0.55rem;
      border-radius: 4px;
      margin-top: 0.12rem;
      white-space: nowrap;
    }

    .status-pill.downloading { background: var(--accent-dim); color: var(--accent); }
    .status-pill.paused      { background: var(--amber-dim);  color: var(--amber); }
    .status-pill.completed   { background: oklch(68% 0.18 142 / 12%); color: oklch(65% 0.15 142); }
    .status-pill.error       { background: var(--red-dim);    color: var(--red); }
    .status-pill.queued      { background: oklch(50% 0.015 245 / 15%); color: var(--steel); }
    .status-pill.stopped     { background: oklch(36% 0.015 245 / 20%); color: var(--text-faint); }

    .card-title-wrap { flex: 1; min-width: 0; }

    .card-name {
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.015em;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .meta-item {
      font-size: 0.7rem;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    /* ── Progress bar ─────────────────────────────────── */
    .prog-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.65rem;
    }

    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease-out;
      background: var(--accent);
    }

    .prog-fill.paused    { background: var(--amber); }
    .prog-fill.completed { background: oklch(68% 0.18 142 / 60%); }
    .prog-fill.error     { background: var(--red); }
    .prog-fill.stopped   { background: var(--text-faint); }

    .prog-pct {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── Stats row ────────────────────────────────────── */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
      min-height: 1.2rem;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .stat-val {
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .stat-icon { opacity: 0.6; }

    .stat-queued {
      font-size: 0.75rem;
      color: var(--text-faint);
      animation: pulse-txt 1.8s ease-in-out infinite;
    }

    @keyframes pulse-txt {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stat-done { font-size: 0.75rem; color: oklch(65% 0.15 142); font-weight: 500; }
    .stat-paused { font-size: 0.75rem; color: var(--amber); font-weight: 500; }
    .stat-stopped { font-size: 0.75rem; color: var(--text-faint); font-weight: 500; }

    /* ── Error message ────────────────────────────────── */
    .error-box {
      font-size: 0.75rem;
      color: var(--red);
      padding: 0.45rem 0.7rem;
      background: var(--red-dim);
      border-radius: 6px;
      border: 1px solid oklch(60% 0.22 25 / 20%);
      margin-bottom: 0.85rem;
      line-height: 1.5;
      word-break: break-word;
    }

    /* ── Action buttons ───────────────────────────────── */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .act-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .act-btn:hover:not(:disabled) {
      color: var(--text);
      background: oklch(23% 0.022 245);
      border-color: oklch(30% 0.025 245);
    }

    .act-btn.danger:hover:not(:disabled) {
      color: var(--red);
      border-color: oklch(60% 0.22 25 / 40%);
      background: var(--red-dim);
    }

    .act-btn.resume:hover:not(:disabled) {
      color: var(--accent);
      border-color: oklch(72% 0.22 142 / 40%);
      background: var(--accent-dim);
    }

    .act-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    /* ── Reconnect banner ─────────────────────────────── */
    #conn-banner {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.45rem;
      opacity: 0;
      transform: translateY(0.5rem);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 50;
    }

    #conn-banner.show { opacity: 1; transform: none; }

    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse-dot 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 520px) {
      main { padding: 1.25rem 0.875rem 2.5rem; }

      .card-name { font-size: 0.8125rem; }

      .stats-row { gap: 0.75rem; }

      .logo-text { display: none; }
    }

    @media (max-width: 380px) {
      nav { padding: 0 0.875rem; }
      main { padding: 1rem 0.75rem 2rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">🚛</div>
    <span class="logo-text">TorrentTrucker</span>
  </a>
  <div class="nav-right">
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Connecting</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Add</a>
      <a href="/downloads" class="nav-link active">Downloads</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 class="page-title">Downloads</h1>
    <span class="counter" id="counter">0 items</span>
  </div>

  <div id="list-root">
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">📭</span>
      <h3>No downloads yet</h3>
      <p>Add a torrent to get started.</p>
      <a href="/" class="btn-add">+ Add Torrent</a>
    </div>
    <div class="download-list" id="download-list"></div>
  </div>
</main>

<div id="conn-banner">
  <div class="pulse-dot"></div>
  Reconnecting…
</div>

<script>
  const dlList     = document.getElementById('download-list')
  const emptyState = document.getElementById('empty-state')
  const counter    = document.getElementById('counter')
  const connDot    = document.getElementById('conn-dot')
  const connLabel  = document.getElementById('conn-label')
  const connBanner = document.getElementById('conn-banner')

  // ── State ─────────────────────────────────────────────
  const downloads = new Map()

  // ── Helpers ───────────────────────────────────────────
  function formatBytes(b) {
    b = Number(b)
    if (!b || isNaN(b)) return '—'
    if (b < 1024) return b + ' B'
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB'
    return (b / 1073741824).toFixed(2) + ' GB'
  }

  function formatSpeed(bps) {
    bps = Number(bps)
    if (!bps || isNaN(bps) || bps < 0) return '0 B/s'
    if (bps < 1024) return bps.toFixed(0) + ' B/s'
    if (bps < 1048576) return (bps / 1024).toFixed(1) + ' KB/s'
    return (bps / 1048576).toFixed(1) + ' MB/s'
  }

  function formatEta(ms) {
    ms = Number(ms)
    if (!ms || ms <= 0 || isNaN(ms) || ms > 864000000) return '—'
    const s = Math.floor(ms / 1000)
    if (s < 60) return s + 's'
    if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's'
    return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm'
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Build full card HTML ──────────────────────────────
  function cardHTML(d) {
    const status   = d.status || 'queued'
    const progress = parseFloat(d.progress) || 0
    const isActive = status === 'downloading'
    const isDone   = status === 'completed'
    const isError  = status === 'error'
    const isPaused = status === 'paused'
    const isStopped = status === 'stopped'
    const isQueued = status === 'queued'

    const canPause  = isActive
    const canResume = isPaused
    const canStop   = isActive || isPaused || isQueued
    const peers     = Number(d.numPeers) || 0

    return `<div class="dl-card" data-id="${esc(d.id)}" data-status="${status}">
      <div class="dl-card-inner">
        <div class="card-top">
          <span class="status-pill ${status}">${status}</span>
          <div class="card-title-wrap">
            <div class="card-name">${esc(d.name || 'Loading metadata…')}</div>
            <div class="card-meta">
              ${d.size && d.size !== '0' ? `<span class="meta-item">💾 ${formatBytes(d.size)}</span>` : ''}
              <span class="meta-item meta-peers"${peers === 0 ? ' style="display:none"' : ''}>
                <span class="val-peers">${peers}</span> peers
              </span>
            </div>
          </div>
        </div>

        <div class="prog-row">
          <div class="prog-track">
            <div class="prog-fill ${status}" style="width:${Math.min(progress,100)}%"></div>
          </div>
          <div class="prog-pct">${isDone ? '100.0' : progress.toFixed(1)}%</div>
        </div>

        <div class="stats-row">
          ${isActive ? `
            <div class="stat">
              <span class="stat-icon">↓</span>
              <span class="stat-val val-dl">${formatSpeed(d.downloadSpeed)}</span>
            </div>
            <div class="stat">
              <span class="stat-icon">↑</span>
              <span class="stat-val val-ul">${formatSpeed(d.uploadSpeed)}</span>
            </div>
            <div class="stat">
              <span class="stat-icon">⏱</span>
              <span class="stat-val val-eta">${formatEta(d.eta)}</span>
            </div>
          ` : ''}
          ${isQueued  ? `<span class="stat-queued">Waiting in queue…</span>` : ''}
          ${isDone    ? `<span class="stat-done">Download complete</span>` : ''}
          ${isPaused  ? `<span class="stat-paused">Paused at ${progress.toFixed(1)}%</span>` : ''}
          ${isStopped ? `<span class="stat-stopped">Stopped at ${progress.toFixed(1)}%</span>` : ''}
        </div>

        ${isError ? `<div class="error-box">⚠ ${esc(d.error || 'An error occurred')}</div>` : ''}

        <div class="card-actions">
          ${canPause  ? `<button class="act-btn" onclick="cmd('${esc(d.id)}','pause')">⏸ Pause</button>` : ''}
          ${canResume ? `<button class="act-btn resume" onclick="cmd('${esc(d.id)}','resume')">▶ Resume</button>` : ''}
          ${canStop   ? `<button class="act-btn" onclick="cmd('${esc(d.id)}','stop')">⏹ Stop</button>` : ''}
          <button class="act-btn danger" onclick="del('${esc(d.id)}')">✕ Remove</button>
        </div>
      </div>
    </div>`
  }

  // ── Full list render (structural changes only) ────────
  function renderAll() {
    const items = [...downloads.values()].sort((a, b) => Number(b.addedAt||0) - Number(a.addedAt||0))
    const count = items.length

    counter.textContent = `${count} ${count === 1 ? 'item' : 'items'}`
    emptyState.style.display = count === 0 ? '' : 'none'

    if (count === 0) { dlList.innerHTML = ''; return }

    // Add new cards / update existing ones (by replacing full HTML)
    const rendered = new Set()
    items.forEach((d) => {
      rendered.add(d.id)
      const existing = dlList.querySelector(`[data-id="${d.id}"]`)
      if (!existing) {
        const wrap = document.createElement('div')
        wrap.innerHTML = cardHTML(d)
        const card = wrap.firstElementChild
        // Insert in sorted position (newest first)
        const cards = [...dlList.children]
        const insertBefore = cards.find(c => {
          const cId = c.dataset.id
          const cD = downloads.get(cId)
          return Number((cD||{}).addedAt||0) < Number(d.addedAt||0)
        })
        if (insertBefore) dlList.insertBefore(card, insertBefore)
        else dlList.appendChild(card)
      } else {
        // Only replace card HTML on structural/status change, not on every progress event
        const curStatus = existing.dataset.status
        if (curStatus !== (d.status || 'queued')) {
          existing.outerHTML = cardHTML(d)
        }
      }
    })

    // Remove stale cards
    dlList.querySelectorAll('[data-id]').forEach(el => {
      if (!rendered.has(el.dataset.id)) el.remove()
    })
  }

  // ── In-place update for progress events (no jitter) ───
  function updateProgress(jobId, d) {
    const card = dlList.querySelector(`[data-id="${jobId}"]`)
    if (!card) { renderAll(); return }

    const progress = parseFloat(d.progress) || 0

    const fill = card.querySelector('.prog-fill')
    if (fill) fill.style.width = `${Math.min(progress, 100)}%`

    const pct = card.querySelector('.prog-pct')
    if (pct) pct.textContent = `${progress.toFixed(1)}%`

    const dlEl = card.querySelector('.val-dl')
    if (dlEl) dlEl.textContent = formatSpeed(d.downloadSpeed)

    const ulEl = card.querySelector('.val-ul')
    if (ulEl) ulEl.textContent = formatSpeed(d.uploadSpeed)

    const etaEl = card.querySelector('.val-eta')
    if (etaEl) etaEl.textContent = formatEta(d.eta)

    const peersEl = card.querySelector('.val-peers')
    if (peersEl) {
      const count = Number(d.numPeers) || 0
      const peerWrap = peersEl.closest('.meta-peers')
      if (peerWrap) peerWrap.style.display = count === 0 ? 'none' : ''
      peersEl.textContent = count
    }
  }

  // ── SSE ───────────────────────────────────────────────
  let es = null
  let reconnectTimer = null

  function connect() {
    if (es) { es.close(); es = null }

    es = new EventSource('/api/events')

    es.onopen = () => {
      connDot.classList.add('live')
      connLabel.textContent = 'Live'
      connBanner.classList.remove('show')
      clearTimeout(reconnectTimer)
    }

    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data)

        if (msg.type === 'init') {
          downloads.clear()
          msg.downloads.forEach(d => downloads.set(d.id, d))
          renderAll()
          return
        }

        const { jobId, type, data } = msg

        if (type === 'deleted') {
          downloads.delete(jobId)
          const card = dlList.querySelector(`[data-id="${jobId}"]`)
          if (card) card.remove()
          const count = downloads.size
          counter.textContent = `${count} ${count === 1 ? 'item' : 'items'}`
          emptyState.style.display = count === 0 ? '' : 'none'
          return
        }

        const existing = downloads.get(jobId) || { id: jobId }
        const updated = { ...existing, ...data, id: jobId }
        downloads.set(jobId, updated)

        if (type === 'progress') {
          // In-place update — no card replacement, no jitter
          updateProgress(jobId, updated)
        } else {
          // Structural change — re-render
          renderAll()
        }
      } catch {}
    }

    es.onerror = () => {
      connDot.classList.remove('live')
      connLabel.textContent = 'Offline'
      connBanner.classList.add('show')
      es.close()
      es = null
      reconnectTimer = setTimeout(connect, 3000)
    }
  }

  connect()

  // ── Actions ───────────────────────────────────────────
  async function cmd(jobId, action) {
    try {
      await fetch(`/api/downloads/${jobId}/${action}`, { method: 'POST' })
    } catch {}
  }

  async function del(jobId) {
    if (!confirm('Remove this download?')) return
    try {
      await fetch(`/api/downloads/${jobId}`, { method: 'DELETE' })
    } catch {}
  }
</script>
</body>
</html>
