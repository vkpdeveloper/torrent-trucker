<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torrent Trucker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --success: #22c55e;
      --error: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #475569;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav a.nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    nav a.nav-link:hover { color: var(--text); background: var(--surface2); }
    nav a.nav-link.active { color: var(--accent); background: var(--accent-glow); }

    /* ── Main ────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      gap: 3rem;
    }

    .hero {
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.6;
    }

    /* ── Drop zone ───────────────────────────────────────────── */
    .upload-card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .drop-zone .icon {
      width: 52px;
      height: 52px;
      background: var(--surface2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .drop-zone .label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    .drop-zone .sub {
      font-size: 0.8rem;
      color: var(--text-faint);
    }

    #file-input { display: none; }

    /* ── File preview ────────────────────────────────────────── */
    .file-preview {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }

    .file-preview.visible { display: flex; }

    .file-preview .file-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .file-preview .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-preview .file-name {
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-preview .file-size {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .file-preview .clear-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .file-preview .clear-btn:hover { color: var(--error); }

    /* ── Submit button ───────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .submit-btn:active:not(:disabled) { transform: scale(0.98); }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
      z-index: 1000;
      min-width: 260px;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success .toast-icon { color: var(--success); }
    #toast.error .toast-icon { color: var(--error); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">🚛 <span>Torrent</span>Trucker</a>
  <div style="display:flex;gap:0.25rem">
    <a href="/" class="nav-link active">Upload</a>
    <a href="/downloads" class="nav-link">Downloads</a>
  </div>
</nav>

<main>
  <div class="hero">
    <h1>Drop a torrent,<br /><span>we'll handle the rest</span></h1>
    <p>Upload a <code>.torrent</code> file and it starts downloading immediately to your server.</p>
  </div>

  <div class="upload-card">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">📦</div>
      <div class="label">Drop your .torrent file here</div>
      <div class="sub">or click to browse</div>
    </div>

    <input type="file" id="file-input" accept=".torrent" />

    <div class="file-preview" id="file-preview">
      <div class="file-icon">🗂️</div>
      <div class="file-info">
        <div class="file-name" id="preview-name">—</div>
        <div class="file-size" id="preview-size">—</div>
      </div>
      <button class="clear-btn" id="clear-btn" title="Remove file">✕</button>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>
      <span id="btn-label">Select a torrent file</span>
    </button>
  </div>
</main>

<div id="toast">
  <span class="toast-icon" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone')
  const fileInput  = document.getElementById('file-input')
  const preview    = document.getElementById('file-preview')
  const previewName = document.getElementById('preview-name')
  const previewSize = document.getElementById('preview-size')
  const clearBtn   = document.getElementById('clear-btn')
  const submitBtn  = document.getElementById('submit-btn')
  const btnLabel   = document.getElementById('btn-label')
  const toast      = document.getElementById('toast')
  const toastMsg   = document.getElementById('toast-msg')
  const toastIcon  = document.getElementById('toast-icon')

  let selectedFile = null
  let toastTimer = null

  function formatBytes(b) {
    if (!b) return 'Unknown size'
    if (b < 1024) return b + ' B'
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB'
    return (b / 1073741824).toFixed(2) + ' GB'
  }

  function showToast(msg, type = 'success') {
    clearTimeout(toastTimer)
    toastMsg.textContent = msg
    toastIcon.textContent = type === 'success' ? '✓' : '✗'
    toast.className = `show ${type}`
    toastTimer = setTimeout(() => { toast.className = '' }, 4000)
  }

  function setFile(file) {
    if (!file) return
    selectedFile = file
    previewName.textContent = file.name
    previewSize.textContent = formatBytes(file.size)
    preview.classList.add('visible')
    dropZone.style.display = 'none'
    submitBtn.disabled = false
    btnLabel.textContent = 'Start Download'
  }

  function clearFile() {
    selectedFile = null
    fileInput.value = ''
    preview.classList.remove('visible')
    dropZone.style.display = ''
    submitBtn.disabled = true
    btnLabel.textContent = 'Select a torrent file'
  }

  dropZone.addEventListener('click', () => fileInput.click())
  fileInput.addEventListener('change', () => setFile(fileInput.files[0]))
  clearBtn.addEventListener('click', clearFile)

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault()
    dropZone.classList.add('drag-over')
  })

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault()
    dropZone.classList.remove('drag-over')
    const file = e.dataTransfer.files[0]
    if (file?.name.endsWith('.torrent')) setFile(file)
    else showToast('Please drop a .torrent file', 'error')
  })

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return

    submitBtn.disabled = true
    btnLabel.innerHTML = '<div class="spinner"></div> Queuing…'

    try {
      const form = new FormData()
      form.append('torrent', selectedFile)

      const res = await fetch('/api/upload', { method: 'POST', body: form })
      const data = await res.json()

      if (!res.ok) throw new Error(data.error || 'Upload failed')

      showToast(`"${data.name}" queued for download`, 'success')
      clearFile()
      setTimeout(() => { window.location.href = '/downloads' }, 1200)
    } catch (err) {
      showToast(err.message || 'Upload failed', 'error')
      submitBtn.disabled = false
      btnLabel.textContent = 'Start Download'
    }
  })
</script>
</body>
</html>
