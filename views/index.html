<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torrent Trucker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           oklch(9.5% 0.012 245);
      --surface:      oklch(13.5% 0.015 245);
      --surface2:     oklch(18% 0.018 245);
      --border:       oklch(23% 0.02 245);
      --border-focus: oklch(45% 0.04 245);
      --accent:       oklch(72% 0.22 142);
      --accent-dim:   oklch(72% 0.22 142 / 14%);
      --amber:        oklch(74% 0.18 65);
      --red:          oklch(60% 0.22 25);
      --text:         oklch(93% 0.008 245);
      --text-muted:   oklch(58% 0.018 245);
      --text-faint:   oklch(36% 0.015 245);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ──────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 0.125rem;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.35rem 0.65rem;
      border-radius: 5px;
      transition: color 0.12s, background 0.12s;
      letter-spacing: -0.01em;
    }

    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); }

    /* ── Main ─────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem 3rem;
      gap: 2.5rem;
    }

    /* ── Hero ─────────────────────────────────────────── */
    .hero {
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.85rem;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.15;
      margin-bottom: 0.65rem;
      color: var(--text);
    }

    .hero p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      font-weight: 400;
    }

    /* ── Upload card ──────────────────────────────────── */
    .upload-card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    /* ── Tabs ─────────────────────────────────────────── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 0.75rem 0.5rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-faint);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text-muted); background: var(--surface2); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-panel { display: none; padding: 1.5rem; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 1rem; }

    /* ── Drop zone ────────────────────────────────────── */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 2.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
      user-select: none;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .dz-icon {
      width: 44px;
      height: 44px;
      background: var(--surface2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      margin-bottom: 0.1rem;
    }

    .dz-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
    }

    .dz-sub {
      font-size: 0.75rem;
      color: var(--text-faint);
    }

    #file-input { display: none; }

    /* ── File preview ─────────────────────────────────── */
    .file-preview {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.7rem 0.9rem;
    }

    .file-preview.visible { display: flex; }

    .fp-icon { font-size: 1.25rem; flex-shrink: 0; }

    .fp-info { flex: 1; min-width: 0; }

    .fp-name {
      font-size: 0.8125rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fp-size {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .fp-clear {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 0.9rem;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }

    .fp-clear:hover { color: var(--red); background: oklch(60% 0.22 25 / 12%); }

    /* ── Magnet input ─────────────────────────────────── */
    .magnet-input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8125rem;
      resize: none;
      height: 90px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    .magnet-input::placeholder { color: var(--text-faint); }
    .magnet-input:focus { border-color: var(--border-focus); }
    .magnet-input.valid { border-color: oklch(72% 0.22 142 / 50%); }

    /* ── Submit button ────────────────────────────────── */
    .submit-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--accent);
      color: oklch(10% 0.01 142);
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
    }

    .submit-btn:hover:not(:disabled) { opacity: 0.88; }
    .submit-btn:active:not(:disabled) { transform: scale(0.985); }

    .submit-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Toast ────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(3rem);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.65rem 1.1rem;
      font-size: 0.8125rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transition: transform 0.28s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.18s;
      z-index: 1000;
      min-width: 240px;
      max-width: 380px;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success .t-icon { color: var(--accent); }
    #toast.error .t-icon { color: var(--red); }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid oklch(10% 0.01 142 / 30%);
      border-top-color: oklch(10% 0.01 142);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      main { padding: 2rem 1rem 2.5rem; gap: 2rem; }
      .hero h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">🚛</div>
    TorrentTrucker
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link active">Add</a>
    <a href="/downloads" class="nav-link">Downloads</a>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Torrent Manager</div>
    <h1>Queue it &amp; forget it</h1>
    <p>Add a torrent and your server handles the rest.</p>
  </div>

  <div class="upload-card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="magnet">Magnet Link</button>
      <button class="tab-btn" data-tab="file">.torrent File</button>
    </div>

    <!-- File tab -->
    <div class="tab-panel" id="tab-file">
      <div class="drop-zone" id="drop-zone">
        <div class="dz-icon">📦</div>
        <div class="dz-label">Drop .torrent file here</div>
        <div class="dz-sub">or tap to browse</div>
      </div>

      <input type="file" id="file-input" accept=".torrent" />

      <div class="file-preview" id="file-preview">
        <div class="fp-icon">🗂️</div>
        <div class="fp-info">
          <div class="fp-name" id="preview-name">—</div>
          <div class="fp-size" id="preview-size">—</div>
        </div>
        <button class="fp-clear" id="clear-btn" aria-label="Remove file">✕</button>
      </div>

      <button class="submit-btn" id="file-submit-btn" disabled>
        <span id="file-btn-label">Select a file first</span>
      </button>
    </div>

    <!-- Magnet tab -->
    <div class="tab-panel active" id="tab-magnet">
      <textarea
        class="magnet-input"
        id="magnet-input"
        placeholder="Paste magnet link…&#10;magnet:?xt=urn:btih:…"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="submit-btn" id="magnet-submit-btn" disabled>
        <span id="magnet-btn-label">Paste a magnet link first</span>
      </button>
    </div>
  </div>
</main>

<div id="toast">
  <span class="t-icon" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
  // ── Tabs ──────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active')
    })
  })

  // ── Toast ─────────────────────────────────────────────
  const toast     = document.getElementById('toast')
  const toastMsg  = document.getElementById('toast-msg')
  const toastIcon = document.getElementById('toast-icon')
  let toastTimer  = null

  function showToast(msg, type = 'success') {
    clearTimeout(toastTimer)
    toastMsg.textContent = msg
    toastIcon.textContent = type === 'success' ? '✓' : '✗'
    toast.className = `show ${type}`
    toastTimer = setTimeout(() => { toast.className = '' }, 4000)
  }

  function formatBytes(b) {
    if (!b) return 'Unknown size'
    if (b < 1024) return b + ' B'
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB'
    return (b / 1073741824).toFixed(2) + ' GB'
  }

  // ── File tab ──────────────────────────────────────────
  const dropZone   = document.getElementById('drop-zone')
  const fileInput  = document.getElementById('file-input')
  const preview    = document.getElementById('file-preview')
  const prevName   = document.getElementById('preview-name')
  const prevSize   = document.getElementById('preview-size')
  const clearBtn   = document.getElementById('clear-btn')
  const fileSubmit = document.getElementById('file-submit-btn')
  const fileBtnLbl = document.getElementById('file-btn-label')
  let selectedFile = null

  function setFile(file) {
    if (!file) return
    selectedFile = file
    prevName.textContent = file.name
    prevSize.textContent = formatBytes(file.size)
    preview.classList.add('visible')
    dropZone.style.display = 'none'
    fileSubmit.disabled = false
    fileBtnLbl.textContent = 'Start Download'
  }

  function clearFile() {
    selectedFile = null
    fileInput.value = ''
    preview.classList.remove('visible')
    dropZone.style.display = ''
    fileSubmit.disabled = true
    fileBtnLbl.textContent = 'Select a file first'
  }

  dropZone.addEventListener('click', () => fileInput.click())
  fileInput.addEventListener('change', () => setFile(fileInput.files[0]))
  clearBtn.addEventListener('click', clearFile)

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault()
    dropZone.classList.add('drag-over')
  })
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault()
    dropZone.classList.remove('drag-over')
    const file = e.dataTransfer.files[0]
    if (file?.name.endsWith('.torrent')) setFile(file)
    else showToast('Please drop a .torrent file', 'error')
  })

  fileSubmit.addEventListener('click', async () => {
    if (!selectedFile) return
    fileSubmit.disabled = true
    fileBtnLbl.innerHTML = '<div class="spinner"></div> Queuing…'
    try {
      const form = new FormData()
      form.append('torrent', selectedFile)
      const res = await fetch('/api/upload', { method: 'POST', body: form })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Upload failed')
      showToast(`"${data.name}" added to queue`, 'success')
      clearFile()
    } catch (err) {
      showToast(err.message || 'Upload failed', 'error')
    } finally {
      fileSubmit.disabled = !selectedFile
      fileBtnLbl.textContent = selectedFile ? 'Start Download' : 'Select a file first'
    }
  })

  // ── Magnet tab ────────────────────────────────────────
  const magnetInput  = document.getElementById('magnet-input')
  const magnetSubmit = document.getElementById('magnet-submit-btn')
  const magnetLbl    = document.getElementById('magnet-btn-label')

  magnetInput.addEventListener('input', () => {
    const valid = magnetInput.value.trim().startsWith('magnet:')
    magnetSubmit.disabled = !valid
    magnetInput.classList.toggle('valid', valid)
    magnetLbl.textContent = valid ? 'Start Download' : 'Paste a magnet link first'
  })

  magnetSubmit.addEventListener('click', async () => {
    const magnetLink = magnetInput.value.trim()
    if (!magnetLink.startsWith('magnet:')) return
    magnetSubmit.disabled = true
    magnetLbl.innerHTML = '<div class="spinner"></div> Queuing…'
    try {
      const res = await fetch('/api/magnet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ magnetLink }),
      })
      const data = await res.json()
      if (!res.ok) throw new Error(data.error || 'Failed to queue magnet')
      showToast(`"${data.name}" added to queue`, 'success')
      magnetInput.value = ''
      magnetInput.classList.remove('valid')
    } catch (err) {
      showToast(err.message || 'Failed to queue magnet', 'error')
    } finally {
      magnetSubmit.disabled = true
      magnetLbl.textContent = 'Paste a magnet link first'
    }
  })
</script>
</body>
</html>
